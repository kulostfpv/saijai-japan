<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAIJAI JAPAN ハイヤー予約</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-color: #111111; --text-color: #eeeeee; --accent-color: #d4af37; --sub-text-color: #cccccc; --border-color: #333333; --font-main: 'Noto Sans JP', sans-serif; --font-accent: 'Playfair Display', serif; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; overflow-x: hidden; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #222 0%, #111 100%); z-index: -1; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
    header { text-align: center; padding: 30px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; }
    .logo { font-family: var(--font-accent); font-size: 28px; color: var(--accent-color); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .subtitle { font-size: 12px; color: var(--sub-text-color); letter-spacing: 1px; }
    section h2 { font-family: var(--font-accent); font-size: 20px; color: var(--accent-color); margin-bottom: 20px; display: flex; align-items: center; }
    section h2::after { content: ''; flex-grow: 1; height: 1px; background-color: var(--border-color); margin-left: 15px; }
    .service-guide { background-color: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; margin-bottom: 30px; }
    .service-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    .service-name { color: var(--sub-text-color); }
    .service-price { color: var(--accent-color); font-weight: bold; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; color: var(--sub-text-color); margin-bottom: 8px; font-weight: bold; }
    .required::after { content: ' *'; color: #cc0000; }
    input[type="text"], input[type="datetime-local"], select { width: 100%; padding: 15px; background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-color); font-size: 16px; font-family: var(--font-main); transition: border-color 0.3s, background-color 0.3s; }
    input[type="text"]:focus, input[type="datetime-local"]:focus, select:focus { outline: none; border-color: var(--accent-color); background-color: rgba(255, 255, 255, 0.08); }
    input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    .vehicle-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .vehicle-option { position: relative; }
    .vehicle-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .vehicle-card { background-color: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; transition: transform 0.2s, border-color 0.3s; height: 100%; }
    .vehicle-option input[type="radio"]:checked + .vehicle-card { border-color: var(--accent-color); background-color: rgba(212, 175, 55, 0.05); transform: translateY(-3px); }
    .vehicle-name { font-size: 14px; font-weight: bold; color: var(--accent-color); margin-bottom: 5px; }
    .vehicle-desc { font-size: 11px; color: var(--sub-text-color); }
    .checkbox-group { margin: 30px 0; display: flex; align-items: flex-start; }
    .checkbox-group input[type="checkbox"] { margin-top: 5px; margin-right: 10px; width: 18px; height: 18px; accent-color: var(--accent-color); }
    .checkbox-group label { font-size: 12px; color: var(--sub-text-color); line-height: 1.4; font-weight: normal; }
    .footer-actions { position: fixed; bottom: 0; left: 0; width: 100%; background-color: rgba(17, 17, 17, 0.95); border-top: 1px solid var(--border-color); padding: 15px 20px; backdrop-filter: blur(5px); z-index: 100; }
    #submitBtn { width: 100%; max-width: 560px; margin: 0 auto; display: block; padding: 18px; background: linear-gradient(135deg, #d4af37 0%, #b38f2d 100%); color: #000; border: none; border-radius: 40px; font-size: 16px; font-weight: bold; font-family: var(--font-main); cursor: pointer; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); transition: transform 0.2s, box-shadow 0.2s; text-transform: uppercase; letter-spacing: 1px; }
    #submitBtn:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(212, 175, 55, 0.2); }
    #submitBtn:disabled { background: #555; color: #888; box-shadow: none; cursor: not-allowed; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; visibility: hidden; opacity: 0; transition: visibility 0s, opacity 0.3s; }
    #loadingOverlay.active { visibility: visible; opacity: 1; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(212, 175, 55, 0.1); border-top: 3px solid var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Saijai Japan</div>
      <div class="subtitle">Premium Hired Car Service</div>
    </header>
    <section>
      <h2>Service Guide</h2>
      <div class="service-guide">
        <div class="service-item"><span class="service-name">空港送迎 (スワンナプーム⇔シラチャ)</span><span class="service-price">1,500 THB〜</span></div>
        <div class="service-item"><span class="service-name">空港送迎 (ドンムアン⇔シラチャ)</span><span class="service-price">1,700 THB〜</span></div>
        <div class="service-item"><span class="service-name">パタヤ⇔シラチャ (片道)</span><span class="service-price">800 THB〜</span></div>
        <div class="subtitle" style="text-align: center; margin-top: 10px;">※車種、時間帯により価格は変動いたします。</div>
      </div>
    </section>
    <section>
      <h2>Reservation Form</h2>
      <form id="bookingForm">
        <div class="form-group"><label for="pickup_datetime" class="required">ご乗車日時</label><input type="datetime-local" id="pickup_datetime" name="pickup_datetime" required></div>
        <div class="form-group"><label for="pickup_loc" class="required">お迎え場所 (出発地)</label><input type="text" id="pickup_loc" name="pickup_loc" placeholder="例：スワンナプーム空港、ホテル名" required></div>
        <div class="form-group"><label for="dropoff_loc" class="required">お送り場所 (目的地)</label><input type="text" id="dropoff_loc" name="dropoff_loc" placeholder="例：シラチャJ-Park、ゴルフ場名" required></div>
        <div class="form-group"><label class="required">ご希望の車種</label>
          <div class="vehicle-options">
            <div class="vehicle-option"><input type="radio" id="car_sedan" name="vehicle_type" value="プレミアムセダン" checked required><label for="car_sedan" class="vehicle-card"><div class="vehicle-name">セダン</div><div class="vehicle-desc">Camry等<br>定員3名/荷物2個</div></label></div>
            <div class="vehicle-option"><input type="radio" id="car_van" name="vehicle_type" value="ファミリーバン" required><label for="car_van" class="vehicle-card"><div class="vehicle-name">バン</div><div class="vehicle-desc">Alphard/Commuter等<br>定員5-9名/荷物大</div></label></div>
          </div>
        </div>
        <div class="form-group"><label for="customer_name" class="required">お名前 (代表者)</label><input type="text" id="customer_name" name="customer_name" placeholder="例：Yamada Taro" required></div>
        <div class="form-group"><label for="customer_tel" class="required">タイでのご連絡先電話番号</label><input type="text" id="customer_tel" name="customer_tel" placeholder="例：090-123-4567" required></div>
        <div class="checkbox-group"><input type="checkbox" id="agree_terms" name="agree_terms" required><label for="agree_terms">上記内容で空車確認・仮予約をリクエストします。確定にはコンシェルジュからの返信が必要となることに同意します。</label></div>
      </form>
    </section>
  </div>
  <div class="footer-actions"><button type="submit" id="submitBtn" form="bookingForm">空車確認・仮予約</button></div>
  <div id="loadingOverlay"><div class="spinner"></div></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ✅ ここに「SAIJAIJAPANアプリ」のLIFF IDを直接書き込んでください
    const MY_LIFF_ID = "2009606187-VS70syZo";

    const form = document.getElementById('bookingForm');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loadingOverlay');

    async function initializeLiff() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) liff.login();
      } catch (error) {
        console.error('LIFF Error', error);
        alert('システムの初期化に失敗しました。');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); 
      if (!form.checkValidity()) return alert('必須項目を入力してください。');
      showLoading(true); submitBtn.disabled = true;

      const formData = new FormData(form);
      const dt = new Date(formData.get('pickup_datetime'));
      const formattedDate = `${dt.getFullYear()}/${(dt.getMonth()+1).toString().padStart(2,'0')}/${dt.getDate().toString().padStart(2,'0')} ${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`;

      const textMessage = `【SJハイヤー予約リクエスト】\n日時：${formattedDate}\n出発：${formData.get('pickup_loc')}\n到着：${formData.get('dropoff_loc')}\n車種：${formData.get('vehicle_type')}\n名前：${formData.get('customer_name')}\n電話：${formData.get('customer_tel')}`;

      try {
        await liff.sendMessages([{ type: 'text', text: textMessage }]);
        showLoading(false);
        alert('予約リクエストを送信しました。コンシェルジュからの返信をお待ちください。');
        liff.closeWindow();
      } catch (error) {
        showLoading(false); submitBtn.disabled = false;
        alert('メッセージ送信に失敗しました。チャット画面から直接ご予約ください。');
      }
    });

    function showLoading(isShowing) { isShowing ? loading.classList.add('active') : loading.classList.remove('active'); }
    initializeLiff();
  </script>
</body>
</html>
